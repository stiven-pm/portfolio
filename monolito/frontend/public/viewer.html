<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Viewer</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #app { position: fixed; inset: 0; background: #fafafa; }
    canvas { display: block; }
    .overlay {
      position: absolute; top: 8px; left: 8px;
      padding: 6px 8px; background: rgba(0,0,0,0.5); color: #fff;
      font: 12px/1.4 system-ui,sans-serif; border-radius: 4px; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="overlay">Doble clic para centrar punto</div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.169.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.169.0/examples/jsm/controls/OrbitControls.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

    const params = new URLSearchParams(location.search);
    const modelUrl = params.get('model') || params.get('src');
    if (!modelUrl) { document.getElementById('app').innerHTML = '<p style="padding:20px">Sin modelo</p>'; throw new Error('Missing model'); }

    const container = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfafafa);
    scene.add(new THREE.AmbientLight(0xffffff, 1.1));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(2.5, 2.0, 3.5);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    let modelRoot = null;
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function focusOnPoint(worldPoint) {
      const hit = worldPoint.clone();
      const toCam = camera.position.clone().sub(hit);
      const dist = toCam.length();
      if (dist > 1e-5) {
        toCam.normalize();
        const newDist = Math.max(dist * 0.55, controls.minDistance || 0.01);
        camera.position.copy(hit.clone().add(toCam.multiplyScalar(newDist)));
      }
      controls.target.copy(hit);
      controls.update();
    }

    renderer.domElement.addEventListener('dblclick', (event) => {
      if (!modelRoot) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(modelRoot, true);
      if (hits.length) focusOnPoint(hits[0].point);
    });

    const loader = new GLTFLoader();
    loader.load(modelUrl, (gltf) => {
      modelRoot = gltf.scene;
      scene.add(modelRoot);
      const box = new THREE.Box3().setFromObject(modelRoot);
      const center = box.getCenter(new THREE.Vector3());
      controls.target.copy(center);
      controls.update();
    });

    addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
