name: Build, Push and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./monolito/backend
          file: ./monolito/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./monolito/frontend
          file: ./monolito/frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_on_server:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/portfolio"; fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "https://github.com/${{ github.repository }}.git" "$APP_DIR"
            else
              git -C "$APP_DIR" fetch --all
              git -C "$APP_DIR" reset --hard "origin/${{ github.ref_name }}"
            fi

            DOCKER_CMD="${{ secrets.DOCKER_CMD }}"
            if [ -z "$DOCKER_CMD" ]; then DOCKER_CMD="docker"; fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | $DOCKER_CMD login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cd "$APP_DIR"
            export DOCKER_REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}/"
            export HOST_IP="${{ secrets.SSH_HOST_IP }}"

            $DOCKER_CMD compose pull backend frontend
            $DOCKER_CMD compose up -d backend frontend
            # Caddy monta index.html/Caddyfile por archivo; sin recrear el contenedor a veces sigue el HTML viejo tras git pull
            $DOCKER_CMD compose up -d --force-recreate --no-deps caddy
